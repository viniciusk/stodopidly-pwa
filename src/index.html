<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="Description" content="Yet another stupidly simple To Do app.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1F3D2C"/>
    <title>sTODOpidly</title>
    <link rel="manifest" href="manifest.json">

    <!-- ── Apple PWA ─────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="sTODOpidly">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icons/180x180.png">

    <!-- iOS splash screens (portrait, one per device resolution) -->
    <link rel="apple-touch-startup-image"
          media="screen and (device-width:320px) and (device-height:568px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)"
          href="splash/splash-640x1136.png">
    <link rel="apple-touch-startup-image"
          media="screen and (device-width:375px) and (device-height:667px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)"
          href="splash/splash-750x1334.png">
    <link rel="apple-touch-startup-image"
          media="screen and (device-width:375px) and (device-height:812px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)"
          href="splash/splash-1125x2436.png">
    <link rel="apple-touch-startup-image"
          media="screen and (device-width:390px) and (device-height:844px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)"
          href="splash/splash-1170x2532.png">
    <link rel="apple-touch-startup-image"
          media="screen and (device-width:393px) and (device-height:852px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)"
          href="splash/splash-1179x2556.png">
    <link rel="apple-touch-startup-image"
          media="screen and (device-width:428px) and (device-height:926px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)"
          href="splash/splash-1284x2778.png">
    <link rel="apple-touch-startup-image"
          media="screen and (device-width:430px) and (device-height:932px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)"
          href="splash/splash-1290x2796.png">
    <link rel="apple-touch-startup-image"
          media="screen and (device-width:768px) and (device-height:1024px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)"
          href="splash/splash-1536x2048.png">
    <link rel="apple-touch-startup-image"
          media="screen and (device-width:1024px) and (device-height:1366px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)"
          href="splash/splash-2048x2732.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script src="js/storage.js"></script>
    <link rel="stylesheet" type="text/css" href="./css/stodopidly.css" media="all">
</head>
<body>

<div id="app">
    <div class="todo-wrap">

        <header class="app-header">
            <h1 class="app-title">sTODOpidly</h1>
            <p class="app-tagline">simple.</p>
        </header>

        <div class="input-area">
            <label for="nextToDoItem" class="visually-hidden">What needs to be done?</label>
            <input
                autocomplete="off"
                v-model="nextToDoItemInput"
                type="text"
                id="nextToDoItem"
                class="todo-input"
                ref="nextToDoItem"
                v-on:keyup.enter="addNextToDoItem"
                placeholder="What needs to be done?"
                autofocus
            >
            <button v-on:click="addNextToDoItem" class="add-btn" type="button">Add</button>
        </div>

        <p v-show="isListEmpty" class="status-msg">Nothing here yet — the day is wide open.</p>

        <ul v-show="!isListEmpty" class="todo-items">
            <li
                v-for="(stodopidlyListItem, todoItemIndex) in stodopidlyList"
                class="todo-item"
                :class="{ 'item-removing': stodopidlyListItem.removing }"
                v-on:click="removeToDoItem(todoItemIndex)"
            >
                <span class="todo-dot"></span>
                <span class="todo-text">{{stodopidlyListItem.text}}</span>
                <span class="todo-done">done</span>
            </li>
        </ul>

        <p v-show="!isListEmpty" class="hint-msg">Tap a task once you've knocked it out.</p>

        <div v-if="isProcessing" class="progress-bar-wrap">
            <div class="progress-bar-fill"></div>
        </div>

        <transition name="fab">
            <button v-if="showInstallHint" v-on:click="installApp" class="install-fab" type="button">
                <span class="install-fab-icon">↓</span>
                install
            </button>
        </transition>

    </div>
</div>

<script src="js/app.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(function () {
                console.log('Service Worker Registered');
            });
    }
</script>
</body>
</html>
